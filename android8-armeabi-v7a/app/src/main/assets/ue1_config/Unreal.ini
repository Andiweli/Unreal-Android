[Engine.Engine]
GameRenderDevice=NOpenGLESDrv.NOpenGLESRenderDevice
WindowedRenderDevice=NOpenGLESDrv.NOpenGLESRenderDevice
AudioDevice=NOpenALDrv.NOpenALAudioSubsystem
NetworkDevice=IpDrv.TcpNetDriver
Console=Engine.Console
Language=int
GameEngine=Engine.GameEngine
EditorEngine=Editor.EditorEngine
DefaultGame=UnrealI.SinglePlayer
DefaultServerGame=UnrealI.DeathMatchGame
ViewportManager=NSDLDrv.NSDLClient
Render=NOpenGLESDrv.NOpenGLESRenderDevice

[Core.System]
PurgeCacheDays=30
SavePath=../Save
CachePath=../Cache
CacheExt=.uxx
Paths=../System/*.u
Paths=../Maps/*.unr
Paths=../Textures/*.utx
Paths=../Sounds/*.uax
Paths=../Music/*.umx
Paths=../Meshes/*.u
Paths=../Help/*.u
Paths=../Web/*.u

[NSDLDrv.NSDLClient]
Brightness=0.5
Gamma=1.0
AndroidResolutionMode=0
StartupFullscreen=True
UseJoystick=True
AndroidNativeController=True
AndroidNativeRightStickScale=0.50 ; ANDROID_NATIVE_CONTROLLER_LINEAR_AXIS_RAMP_V97
AndroidNativeLeftStickDeadzone=0.06 ; ANDROID_NATIVE_CONTROLLER_LEFT_STICK_SMOOTHER_LINEAR_V100
AndroidNativeRightStickDeadzone=0.14 ; ANDROID_NATIVE_CONTROLLER_LINEAR_AXIS_RAMP_V97
AndroidNativeTriggerDeadzone=0.12 ; ANDROID_NATIVE_CONTROLLER_DEADZONE_CURVE_V94
AndroidNativeAxisCurve=1.00 ; ANDROID_NATIVE_CONTROLLER_LINEAR_AXIS_RAMP_V97
DeadZoneXYZ=0.12
DeadZoneRUV=0.12
ScaleXYZ=100.0
ScaleRUV=75.0
InvertY=False
InvertV=False
LowDetailTextures=False

[NOpenGLESDrv.NOpenGLESRenderDevice]
Translucency=True
VolumetricLighting=True
ShinySurfaces=True
Coronas=True
HighDetailActors=True
AutoFOV=True
SwapInterval=1
DetailTextures=True
Overbright=True
BrightnessScale=1.0
WorldGamma=1.0
WorldShadowLift=0.0

[NOpenALDrv.NOpenALAudioSubsystem]
OutputRate=44100
MusicVolume=63
SoundVolume=127
MasterVolume=255
AmbientFactor=0.6
DopplerFactor=0.01
UseReverb=False
UseHRTF=False
MusicInterpolation=1

[UnrealI.UnrealHUD]
HudMode=0
Crosshair=0

[Unreal.UnrealHUD]
HudMode=0
Crosshair=0

; v88: resets native controller debounce state on pause/resume/focus to avoid first button press being swallowed. ANDROID_CONTROLLER_NATIVE_RESET_V88

[WinDrv.WindowsClient]
UseJoystick=True
