; Android controller defaults / notes for UE1 Android 1.2.0
; GameSir X2 Pro analog-input fix v68, based on the v57 friendly-name/key-capture flow plus v67 trigger-hold fix.
;
; Real analog axes used during gameplay:
;   JoyX = left stick X
;   JoyY = left stick Y
;   JoyU = right stick X
;   JoyV = right stick Y
;   JoyZ = left trigger analog
;   JoyR = right trigger analog
;
; v57 keeps gameplay analog, but the stock Unreal Controls menu receives clear
; direction/button names while it is waiting for a key press. Unlike the previous friendly-name patch, the
; native friendly-name injection now also exits KeyMenuing, so the shown key is
; confirmed/accepted by the original menu flow:
;   A / B / X / Y          = normalized SDL controller face buttons
;   ShoulderL / ShoulderR  = L1 / R1
;   TriggerL / TriggerR    = analog L2 / R2
;   LJoyPush / RJoyPush    = left/right stick click
;   LJoyLeft / LJoyRight   = left stick horizontal directions
;   LJoyUp / LJoyDown      = left stick vertical directions
;   RJoyLeft / RJoyRight   = right stick horizontal directions
;   RJoyUp / RJoyDown      = right stick vertical directions
;   DPadUp / DPadDown      = physical D-Pad vertical directions
;   DPadLeft / DPadRight   = physical D-Pad horizontal directions
;
; D-Pad is no longer reused as the left-stick remap key. It can be assigned as
; its own control in the menu.
;
; The right stick look scale is intentionally much lower than v55 because some
; Android controllers, including GameSir X2 Pro, felt far too fast even on low
; in-game sensitivity.
;
; Legacy trigger-button bindings are still supported outside the key-capture
; menu as Joy12/Joy13, but new remaps should use TriggerL/TriggerR.
;
; If a raw Android HID button cannot be mapped to a known controller label,
; v57 uses stable fallback names such as Key12, Key13, Key14, Key15 or Key16.
;
; If "Joystick Enabled" is changed in the stock options menu, v57 redirects the
; old WinDrv.WindowsClient UseJoystick setting to NSDLDrv.NSDLClient UseJoystick.
;
; Logcat marker: UE1_CONTROLLER_AXIS v68

