; Android default configuration copied on first start if System/Default.ini is missing.
; Keep this file close to Unreal.ini so the original UE1 first-run copy logic has a fallback.

[Engine.Engine]
GameRenderDevice=NOpenGLESDrv.NOpenGLESRenderDevice
WindowedRenderDevice=NOpenGLESDrv.NOpenGLESRenderDevice
AudioDevice=NOpenALDrv.NOpenALAudioSubsystem
Console=Engine.Console
Language=int
GameEngine=Engine.GameEngine
DefaultGame=UnrealI.SinglePlayer
ViewportManager=NSDLDrv.NSDLClient

[Core.System]
SavePath=../Save
CachePath=../Cache
CacheExt=.uxx
Paths=../System/*.u
Paths=../Maps/*.unr
Paths=../Textures/*.utx
Paths=../Sounds/*.uax
Paths=../Music/*.umx
Paths=../Meshes/*.u

[NSDLDrv.NSDLClient]
Brightness=0.5
Gamma=1.0
StartupFullscreen=True
UseJoystick=True
DeadZoneXYZ=0.12
DeadZoneRUV=0.12
ScaleXYZ=100.0
ScaleRUV=75.0
InvertY=False
InvertV=False
LowDetailTextures=False

[NOpenGLESDrv.NOpenGLESRenderDevice]
VolumetricLighting=True
ShinySurfaces=True
Coronas=True
HighDetailActors=True
AutoFOV=True
SwapInterval=1
DetailTextures=True
Overbright=True
BrightnessScale=1.0
WorldGamma=1.0
WorldShadowLift=0.0

[UnrealI.UnrealHUD]
HudMode=0
Crosshair=0

[Unreal.UnrealHUD]
HudMode=0
Crosshair=0
