; Android default configuration copied on first start if System/Default.ini is missing.
; Keep this file close to Unreal.ini so the original UE1 first-run copy logic has a fallback.

[Engine.Engine]
GameRenderDevice=NOpenGLESDrv.NOpenGLESRenderDevice
WindowedRenderDevice=NOpenGLESDrv.NOpenGLESRenderDevice
AudioDevice=NOpenALDrv.NOpenALAudioSubsystem
Console=Engine.Console
Language=int
GameEngine=Engine.GameEngine
DefaultGame=UnrealI.SinglePlayer
ViewportManager=NSDLDrv.NSDLClient

[Core.System]
SavePath=../Save
CachePath=../Cache
CacheExt=.uxx
Paths=../System/*.u
Paths=../Maps/*.unr
Paths=../Textures/*.utx
Paths=../Sounds/*.uax
Paths=../Music/*.umx
Paths=../Meshes/*.u

[NSDLDrv.NSDLClient]
Brightness=0.5
Gamma=1.00
StartupFullscreen=True
UseJoystick=True
DeadZoneXYZ=0.12
DeadZoneRUV=0.12
ScaleXYZ=100.0
ScaleRUV=75.0
InvertY=False
InvertV=False

[NOpenGLESDrv.NOpenGLESRenderDevice]
BrightnessScale=1.0
WorldGamma=1.00
WorldShadowLift=0.0
OuyaRenderResolution=960x540
OuyaRenderWidth=960
OuyaRenderHeight=540
PerfSpikeLog=False
PerfSpikeThresholdMS=40.0

[OUYA.Performance]
; Fast defaults: 960x540 target, logging off unless you explicitly profile.
EnablePerfLog=False
PerfSpikeMs=40
IOSpikeMs=8
TargetFPS=30
RenderWidth=960
RenderHeight=540
ReduceParticleCount=False
ParticleScale=1.0
LimitCoronas=False
ReduceWaterEffects=False
ReduceExplosionParticles=False
DetailTextures=True
DynamicLights=True
VolumetricLighting=True
Coronas=True
ShinySurfaces=True
VSync=True
FrameLimit=0
ForceGLFlush=False
