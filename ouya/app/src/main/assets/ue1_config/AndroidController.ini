; Optional reference mapping for Android gamepads.
; The SDL driver exposes axes/buttons as JoyX/JoyY/JoyU/JoyV/Joy1..Joy13.
;
; Suggested Unreal input bindings:
; JoyX  = strafe left/right
; JoyY  = move forward/back
; JoyU  = turn camera left/right
; JoyV  = look up/down
; Joy13 = fire / R2
; Joy12 = alt-fire / L2
; Joy1  = use / A/Cross
; Joy2  = jump or back / B/Circle
; Joy3  = weapon/action / X/Square
; Joy4  = next weapon/inventory / Y/Triangle
; Joy7  = menu / Start
; Joy5  = console/back / Select
;
; Tuning lives in Unreal.ini under [NSDLDrv.NSDLClient]:
; DeadZoneXYZ, DeadZoneRUV, ScaleXYZ, ScaleRUV, InvertY, InvertV.

; Rev27: START -> Escape, rechter Stick -> MouseX/MouseY für Ingame-Mausempfindlichkeit.
; Rev28: rechter Stick Basisfaktor 60 -> 4, also ca. 15x langsamer.
